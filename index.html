<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" href="masha_default.png" type="image/png">
<title>Masha recolecta frutas</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100dvh;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }
  #gameContainer {
    position: relative;
    border: 4px solid #e94560;
    border-radius: 16px;
    box-shadow: 0 0 60px rgba(233, 69, 96, 0.4);
    overflow: hidden;
    width: 1400px;
    max-width: min(100vw - 8px, calc(100dvh - 8px) * 1.647);
  }
  canvas {
    display: block;
    width: 100%;
    height: auto;
    aspect-ratio: 1400 / 850;
    image-rendering: auto;
    touch-action: none;
  }
  #ui {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 15px 30px;
    display: flex; justify-content: space-between; align-items: center;
    pointer-events: none; z-index: 10;
  }
  #score {
    color: white; font-size: clamp(14px, 2.4vw, 32px); font-weight: bold;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.9);
    background: rgba(0,0,0,0.55); padding: clamp(4px, 0.8vw, 10px) clamp(8px, 1.5vw, 20px); border-radius: clamp(4px, 0.8vw, 10px);
    letter-spacing: 1px;
  }
  #lives {
    font-size: clamp(14px, 2.4vw, 32px);
    text-shadow: 2px 2px 6px rgba(0,0,0,0.9);
    background: rgba(0,0,0,0.55); padding: clamp(4px, 0.8vw, 10px) clamp(8px, 1.5vw, 20px); border-radius: clamp(4px, 0.8vw, 10px);
  }
  #message {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: white; font-size: clamp(24px, 5vw, 64px); font-weight: bold;
    text-shadow: 4px 4px 8px rgba(0,0,0,0.95);
    text-align: center; pointer-events: none; z-index: 20;
    display: none;
    line-height: 1.4;
  }
  #message .sub { font-size: clamp(14px, 2.5vw, 32px); margin-top: clamp(4px, 0.9vw, 12px); font-weight: normal; }
  #message .restart { font-size: clamp(12px, 2vw, 26px); margin-top: clamp(8px, 1.8vw, 24px); color: #ffd93d; font-weight: normal; }
  #controls-info {
    position: absolute; bottom: clamp(4px, 1vw, 14px); left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.45); font-size: clamp(10px, 1.4vw, 18px);
    pointer-events: none; z-index: 10;
    background: rgba(0,0,0,0.3); padding: 6px 16px; border-radius: 6px;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
  <div id="ui">
    <div id="score">🍎 0 / 10</div>
    <div id="lives">❤️❤️❤️</div>
  </div>
  <div id="message">
    <div id="messageText"></div>
    <div class="sub" id="messageSub"></div>
    <div class="restart" id="messageRestart"></div>
  </div>
  <div id="controls-info"></div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const messageEl = document.getElementById('message');
const messageText = document.getElementById('messageText');
const messageSub = document.getElementById('messageSub');
const messageRestart = document.getElementById('messageRestart');

canvas.width = 1400;
canvas.height = 850;

const GAME_WIDTH = 1400;
const GAME_HEIGHT = 850;
const TARGET_SCORE = 10;
const MAX_LIVES = 3;

let gameState = 'loading';
let score = 0;
let lives = MAX_LIVES;
let keys = {};
let frameCount = 0;

const assets = { images: {}, sounds: {} };
let assetsLoaded = { images: 0, sounds: 0, totalImages: 6, totalSounds: 4 };

const player = {
  x: GAME_WIDTH / 2 - 90,
  y: GAME_HEIGHT - 270,
  width: 180,
  height: 240,
  speed: 7,
  dx: 0
};

let fruits = [];
const FRUIT_SIZE = 80;
let fruitSpawnTimer = 0;

const wolf = {
  x: -220,
  y: 120,
  width: 210,
  height: 210,
  speed: 3,
  active: false,
  timer: 0,
  direction: 1,
  moveTimer: 0
};

let particles = [];
let celebrationActive = false;
let hitTimer = 0;

const bonusItems = [];

// --- Asset Loading ---
function loadAssets() {
  const imageFiles = [
    { name: 'fondo', path: 'fondo_bosque.png' },        // ruta adaptada
    { name: 'masha', path: 'masha_default.png' },       // ruta adaptada
    { name: 'fruta', path: 'fruta.png' },               // ruta adaptada
    { name: 'lobo', path: 'lobo_arbol.png' },           // ruta adaptada
    { name: 'conejo', path: 'conejo_saludo.png' },      // ruta adaptada
    { name: 'oso', path: 'oso_saludo.png' }             // ruta adaptada
  ];

  const soundFiles = [
    { name: 'musica_fondo', path: 'musica_fondo.mp3' },         // ruta adaptada
    { name: 'recoger_fruta', path: 'recoger_fruta.mp3' },       // ruta adaptada
    { name: 'celebracion', path: 'celebracion.mp3' },           // ruta adaptada
    { name: 'pasos', path: 'pasos.mp3' }                        // ruta adaptada
  ];

  imageFiles.forEach(file => {
    const img = new Image();
    img.onload = () => { assetsLoaded.images++; checkReady(); };
    img.onerror = () => { assetsLoaded.images++; checkReady(); };
    img.src = file.path;
    assets.images[file.name] = img;
  });

  soundFiles.forEach(file => {
    const audio = new Audio();
    audio.addEventListener('canplaythrough', () => { assetsLoaded.sounds++; checkReady(); }, { once: true });
    audio.addEventListener('error', () => { assetsLoaded.sounds++; checkReady(); }, { once: true });
    audio.src = file.path;
    assets.sounds[file.name] = audio;
  });
}

function checkReady() {
  if (assetsLoaded.images >= assetsLoaded.totalImages && assetsLoaded.sounds >= assetsLoaded.totalSounds) {
    gameState = 'playing';
  }
}

// --- Game Functions ---
function spawnFruit() {
  const x = 20 + Math.random() * (GAME_WIDTH - 40 - FRUIT_SIZE);
  fruits.push({
    x, y: -FRUIT_SIZE, width: FRUIT_SIZE, height: FRUIT_SIZE,
    speed: 1.2 + Math.random() * 2.8,
    wobble: Math.random() * Math.PI * 2
  });
}

function spawnWolf() {
  wolf.active = true;
  wolf.x = Math.random() < 0.5 ? -wolf.width : GAME_WIDTH;
  wolf.y = 100 + Math.random() * (GAME_HEIGHT - 400);
  wolf.direction = wolf.x < 0 ? 1 : -1;
  wolf.timer = 0;
  wolf.moveTimer = 0;
}

function resetGame() {
  score = 0;
  lives = MAX_LIVES;
  fruits = [];
  wolf.active = false;
  particles = [];
  bonusItems.length = 0;
  celebrationActive = false;
  hitTimer = 0;
  player.x = GAME_WIDTH / 2 - 90;
  gameState = 'playing';
  messageEl.style.display = 'none';
  updateUI();
  assets.sounds.musica_fondo.currentTime = 0;
  const p = assets.sounds.musica_fondo.play();
  if (p) p.catch(() => {});
}

function gameOver() {
  gameState = 'lost';
  messageText.textContent = '💀 ¡Perdiste!';
  messageSub.textContent = 'El lobo te atrapó';
  messageRestart.textContent = 'Presiona ESPACIO para reiniciar';
  messageEl.style.display = 'block';
  assets.sounds.musica_fondo.pause();
}

function winGame() {
  gameState = 'won';
  messageText.textContent = '🎉 ¡Ganaste!';
  messageSub.textContent = 'Recolectaste todas las frutas';
  messageRestart.textContent = 'Presiona ESPACIO para reiniciar';
  messageEl.style.display = 'block';
  celebrationActive = true;
  assets.sounds.musica_fondo.pause();
  const c = assets.sounds.celebracion.cloneNode(true);
  c.volume = 0.5;
  c.play().catch(() => {});
  for (let i = 0; i < 100; i++) {
    particles.push({
      x: GAME_WIDTH / 2 + (Math.random() - 0.5) * 700,
      y: GAME_HEIGHT / 2 + (Math.random() - 0.5) * 500,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 0.5) * 8 - 3,
      size: 5 + Math.random() * 16,
      color: ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff6bff', '#ff9f43'][Math.floor(Math.random() * 6)],
      life: 1
    });
  }
}

function updateUI() {
  scoreEl.textContent = `🍎 ${score} / ${TARGET_SCORE}`;
  let hearts = '';
  for (let i = 0; i < lives; i++) hearts += '❤️';
  for (let i = lives; i < MAX_LIVES; i++) hearts += '🖤';
  livesEl.textContent = hearts;
}

function checkCollision(a, b) {
  return a.x < b.x + b.width && a.x + a.width > b.x &&
         a.y < b.y + b.height && a.y + a.height > b.y;
}

function vibrate(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

function playSound(name, vol = 0.4) {
  try {
    const s = assets.sounds[name].cloneNode(true);
    s.volume = vol;
    s.play();
  } catch(e) {}
}

// --- Update ---
function update() {
  frameCount++;

  if (gameState === 'loading') return;

  if (gameState !== 'playing') {
    if (celebrationActive) {
      particles = particles.filter(p => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.06;
        p.life -= 0.007;
        return p.life > 0;
      });
    }
    return;
  }

  // Player movement
  player.dx = 0;
  if (keys['ArrowLeft'] || keys['KeyA']) player.dx = -player.speed;
  if (keys['ArrowRight'] || keys['KeyD']) player.dx = player.speed;
  player.x += player.dx;
  player.x = Math.max(0, Math.min(GAME_WIDTH - player.width, player.x));

  // Spawn fruits
  fruitSpawnTimer++;
  const spawnRate = Math.max(25, 70 - Math.floor(score / 2) * 5);
  if (fruitSpawnTimer >= spawnRate) {
    fruitSpawnTimer = 0;
    spawnFruit();
  }

  // Update fruits
  for (let i = fruits.length - 1; i >= 0; i--) {
    const f = fruits[i];
    f.y += f.speed;
    f.wobble += 0.04;
    f.x += Math.sin(f.wobble) * 0.5;

    if (checkCollision(player, f)) {
      score++;
      fruits.splice(i, 1);
      updateUI();
      playSound('recoger_fruta', 0.35);
      if (score >= TARGET_SCORE) { winGame(); return; }
      continue;
    }
    if (f.y > GAME_HEIGHT + 30) fruits.splice(i, 1);
  }

  // Wolf logic
  if (!wolf.active) {
    wolf.timer++;
    if (wolf.timer > 100 + Math.random() * 140) spawnWolf();
  } else {
    wolf.moveTimer++;
    wolf.x += wolf.speed * wolf.direction;
    wolf.y += Math.sin(wolf.moveTimer * 0.035) * 2.5;

    if (checkCollision(player, wolf)) {
      lives--;
      updateUI();
      vibrate(lives <= 0 ? [100, 100, 200] : 200);
      hitTimer = 30;
      for (let i = 0; i < 25; i++) {
        particles.push({
          x: player.x + player.width / 2,
          y: player.y + player.height / 2,
          vx: (Math.random() - 0.5) * 14,
          vy: (Math.random() - 0.5) * 14 - 4,
          size: 4 + Math.random() * 10,
          color: ['#ff0000', '#ff4444', '#ff6666', '#ff2222'][Math.floor(Math.random() * 4)],
          life: 1
        });
      }
      if (lives <= 0) { gameOver(); return; }
      else {
        player.x = GAME_WIDTH / 2 - 90;
        wolf.active = false;
        wolf.timer = 0;
      }
    }
    if (wolf.x < -wolf.width - 100 || wolf.x > GAME_WIDTH + 100) {
      wolf.active = false;
      wolf.timer = 0;
    }
  }
}

// --- Draw ---
function draw() {
  ctx.save();
  if (hitTimer > 0) {
    const shakeX = (Math.random() - 0.5) * 18;
    const shakeY = (Math.random() - 0.5) * 18;
    ctx.translate(shakeX, shakeY);
  }
  ctx.clearRect(-10, -10, GAME_WIDTH + 20, GAME_HEIGHT + 20);

  if (gameState === 'loading') {
    ctx.restore();
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
    ctx.fillStyle = 'white';
    ctx.font = '40px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('🎮 Cargando...', GAME_WIDTH / 2, GAME_HEIGHT / 2 - 40);
    const total = assetsLoaded.totalImages + assetsLoaded.totalSounds;
    const loaded = assetsLoaded.images + assetsLoaded.sounds;
    const pct = Math.min(1, loaded / total);
    ctx.fillStyle = '#333';
    ctx.fillRect(GAME_WIDTH / 2 - 180, GAME_HEIGHT / 2 + 15, 360, 30);
    ctx.fillStyle = '#e94560';
    ctx.fillRect(GAME_WIDTH / 2 - 180, GAME_HEIGHT / 2 + 15, 360 * pct, 30);
    return;
  }

  // Background
  if (assets.images.fondo.complete && assets.images.fondo.naturalWidth > 0) {
    ctx.drawImage(assets.images.fondo, 0, 0, GAME_WIDTH, GAME_HEIGHT);
  } else {
    const grad = ctx.createLinearGradient(0, 0, 0, GAME_HEIGHT);
    grad.addColorStop(0, '#87CEEB');
    grad.addColorStop(0.6, '#90EE90');
    grad.addColorStop(1, '#228B22');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
  }

  // Floor decoration
  ctx.fillStyle = 'rgba(34, 139, 34, 0.35)';
  ctx.fillRect(0, GAME_HEIGHT - 28, GAME_WIDTH, 28);

  // Fruits
  fruits.forEach(f => {
    ctx.save();
    if (assets.images.fruta.complete && assets.images.fruta.naturalWidth > 0) {
      ctx.drawImage(assets.images.fruta, f.x, f.y, f.width, f.height);
    } else {
      ctx.fillStyle = '#ff6b6b';
      ctx.beginPath();
      ctx.arc(f.x + f.width / 2, f.y + f.height / 2, f.width / 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ff3b3b';
      ctx.beginPath();
      ctx.arc(f.x + f.width / 2 - 6, f.y + f.height / 2 - 6, f.width / 5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  });

  // Wolf
  if (wolf.active) {
    if (assets.images.lobo.complete && assets.images.lobo.naturalWidth > 0) {
      ctx.save();
      if (wolf.direction < 0) ctx.scale(-1, 1);
      const drawX = wolf.direction < 0 ? -wolf.x - wolf.width : wolf.x;
      ctx.drawImage(assets.images.lobo, drawX, wolf.y, wolf.width, wolf.height);
      ctx.restore();
    } else {
      ctx.fillStyle = '#555';
      ctx.fillRect(wolf.x, wolf.y, wolf.width, wolf.height);
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.arc(wolf.x + (wolf.direction > 0 ? wolf.width - 25 : 25), wolf.y + 30, 14, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Player (Masha)
  ctx.save();
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  if (assets.images.masha.complete && assets.images.masha.naturalWidth > 0) {
    ctx.drawImage(assets.images.masha, player.x, player.y, player.width, player.height);
  } else {
    ctx.fillStyle = '#ff69b4';
    ctx.fillRect(player.x, player.y, player.width, player.height);
    ctx.fillStyle = '#ff1493';
    ctx.beginPath();
    ctx.arc(player.x + player.width / 2, player.y + player.height / 3, 24, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size / 2, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  ctx.restore();

  // Red flash overlay when hit
  if (hitTimer > 0) {
    ctx.fillStyle = `rgba(255, 0, 0, ${hitTimer / 60})`;
    ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
    hitTimer = Math.max(0, hitTimer - 1);
  }

  // Celebration: oso y conejo
  if (celebrationActive) {
    const bounce = Math.sin(frameCount * 0.06) * 12;
    const osoWidth = 160, osoHeight = 200;
    const conejoWidth = 130, conejoHeight = 170;
    // Oso a la izquierda
    if (assets.images.oso.complete && assets.images.oso.naturalWidth > 0) {
      ctx.drawImage(assets.images.oso, 60, GAME_HEIGHT / 2 - osoHeight / 2 + bounce, osoWidth, osoHeight);
    }
    // Conejo a la derecha
    if (assets.images.conejo.complete && assets.images.conejo.naturalWidth > 0) {
      ctx.drawImage(assets.images.conejo, GAME_WIDTH - 60 - conejoWidth, GAME_HEIGHT / 2 - conejoHeight / 2 - bounce, conejoWidth, conejoHeight);
    }
    // Texto extra de celebración
    ctx.fillStyle = 'rgba(255, 215, 0, 0.6)';
    ctx.font = 'bold 28px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('🐻 ¡Felicidades! 🐰', GAME_WIDTH / 2, GAME_HEIGHT - 60);
  }
}

// --- Game Loop ---
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// --- Input ---
document.addEventListener('keydown', (e) => {
  keys[e.code] = true;
  if (e.code === 'Space' && (gameState === 'won' || gameState === 'lost')) {
    resetGame();
  }
});

document.addEventListener('keyup', (e) => {
  keys[e.code] = false;
});

// Touch controls — seguimiento directo del dedo
function movePlayerToTouch(clientX) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = GAME_WIDTH / rect.width;
  const canvasX = (clientX - rect.left) * scaleX;
  player.x = canvasX - player.width / 2;
  player.x = Math.max(0, Math.min(GAME_WIDTH - player.width, player.x));
}
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (gameState === 'won' || gameState === 'lost') { resetGame(); return; }
  movePlayerToTouch(e.touches[0].clientX);
});
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  movePlayerToTouch(e.touches[0].clientX);
});
canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
});

// --- Mobile detection & controls hint ---
const isMobile = /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
  || ('ontouchstart' in window && window.innerWidth < 1024);

const controlsInfo = document.getElementById('controls-info');
if (isMobile) {
  controlsInfo.textContent = 'Toca la pantalla y arrastra para mover a Masha  |  Toca para reiniciar';
} else {
  controlsInfo.textContent = '← →  o  A D  |  ESPACIO para reiniciar';
}

// --- Resize for mobile ---
function resizeGame() {
  const ww = window.innerWidth;
  const wh = window.innerHeight;
  const ratio = GAME_WIDTH / GAME_HEIGHT;
  const maxW = ww - 8;
  const maxH = wh - 8;
  let w = maxW;
  let h = w / ratio;
  if (h > maxH) { h = maxH; w = h * ratio; }
  const container = document.getElementById('gameContainer');
  container.style.width = w + 'px';
  container.style.height = h + 'px';
}
window.addEventListener('resize', resizeGame);
window.addEventListener('orientationchange', () => setTimeout(resizeGame, 300));

// --- Start ---
updateUI();
resizeGame();
loadAssets();
gameLoop();
</script>
</body>
</html>
