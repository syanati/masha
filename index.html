<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Masha y el Oso – Aventura Gigante</title>
    <link rel="icon" type="image/png" href="masha_default.png" sizes="any">
    <link rel="apple-touch-icon" href="masha_default.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a3a1a">
    <meta name="msapplication-TileImage" content="masha_default.png">
    <meta name="msapplication-TileColor" content="#1a3a1a">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', 'Comic Neue', cursive;
            height: 100dvh;
        }
        .rotate-warning {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            color: white;
            z-index: 9999;
            justify-content: center;
            align-items: center;
            font-size: clamp(1rem, 5vw, 1.8rem);
            text-align: center;
            flex-direction: column;
            gap: 20px;
        }
        @media (orientation: portrait) {
            .rotate-warning { display: flex; }
            .game-wrapper, .loading-overlay { display: none; }
        }

        /* Overlay de carga */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            color: white;
            font-size: 1.5rem;
            transition: opacity 0.3s;
        }
        .loading-bar-container {
            width: 80%;
            max-width: 400px;
            height: 20px;
            background: #333;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }
        .loading-bar {
            width: 0%;
            height: 100%;
            background: #f3a546;
            border-radius: 10px;
            transition: width 0.2s;
        }
        .start-button {
            display: none;
            background: #f3a546;
            border: none;
            color: #2d1b0c;
            font-weight: bold;
            padding: 1.5vmin 4vmin;
            border-radius: 5vmin;
            font-size: clamp(1.2rem, 4vmin, 2rem);
            cursor: pointer;
            box-shadow: 0 0.5vmin 0 #b85e1a;
            margin-top: 20px;
            touch-action: manipulation;
        }
        .start-button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #b85e1a;
        }

        .game-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            touch-action: none;
        }
        .ui-top-left {
            position: absolute;
            top: 1.5vmin;
            left: 1.5vmin;
            z-index: 10;
        }
        .ui-top-right {
            position: absolute;
            top: 1.5vmin;
            right: 1.5vmin;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 1.5vmin;
        }
        .score-badge {
            background: rgba(254,245,224,0.9);
            padding: 1.2vmin 3vmin;
            border-radius: 3vmin;
            font-size: clamp(1rem, 4vmin, 2rem);
            font-weight: bold;
            color: #c73f1e;
            box-shadow: 0 0.5vmin 1.5vmin rgba(0,0,0,0.25);
            backdrop-filter: blur(4px);
        }
        .btn-icon {
            background: rgba(243,165,70,0.9);
            border: none;
            color: #2d1b0c;
            font-weight: bold;
            padding: 1.5vmin 3vmin;
            border-radius: 3vmin;
            font-size: clamp(0.9rem, 3.5vmin, 1.4rem);
            cursor: pointer;
            box-shadow: 0 0.5vmin 0 #b85e1a;
            backdrop-filter: blur(4px);
            touch-action: manipulation;
            text-decoration: none;
            line-height: 1.2;
            white-space: nowrap;
        }
        .btn-icon:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #b85e1a;
        }
        .upload-label {
            background: rgba(243,165,70,0.9);
            padding: 1.5vmin 3vmin;
            border-radius: 3vmin;
            font-weight: bold;
            cursor: pointer;
            color: #2d1b0c;
            font-size: clamp(0.9rem, 3.5vmin, 1.4rem);
            box-shadow: 0 0.5vmin 0 #b85e1a;
            backdrop-filter: blur(4px);
            display: inline-block;
            touch-action: manipulation;
        }
        .upload-label:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #b85e1a;
        }
        #heroPhoto { display: none; }
        .fullscreen-btn {
            background: rgba(0,0,0,0.5);
            color: white;
            border: 1px solid rgba(255,255,255,0.6);
            padding: 1.2vmin 2.5vmin;
            border-radius: 2vmin;
            font-size: clamp(0.8rem, 3vmin, 1.2rem);
            cursor: pointer;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>
    <div class="rotate-warning">
        <div>📱 Gira tu dispositivo a modo horizontal para jugar</div>
    </div>

    <!-- Overlay de carga -->
    <div class="loading-overlay" id="loadingOverlay">
        <div>Cargando el bosque...</div>
        <div class="loading-bar-container">
            <div class="loading-bar" id="loadingBar"></div>
        </div>
        <button class="start-button" id="startButton">🎮 Toca para jugar</button>
    </div>

    <div class="game-wrapper">
        <canvas id="gameCanvas"></canvas>
        <div class="ui-top-left">
            <button class="fullscreen-btn" id="fullscreenBtn">⛶ Pantalla completa</button>
        </div>
        <div class="ui-top-right">
            <div class="score-badge">🍎 <span id="fruitCounter">0</span> / <span id="totalFruits">10</span></div>
            <label class="upload-label" for="heroPhoto">📸 Subir mi foto</label>
            <input type="file" id="heroPhoto" accept="image/*">
            <button class="btn-icon" id="resetBtn">🌲 Reiniciar</button>
        </div>
    </div>

    <script>
        (function(){
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const WORLD_W = 1100;
            const WORLD_H = 620;

            // ===================== CONFIGURACIÓN =====================
            const FRUTAS_OBJETIVO = 30;
            const MOVE_SPEED = 16.8;
            const FRUIT_SPEED_MULTIPLIER = 1.6;
            const THROW_INTERVAL = 28;
            // =========================================================

            document.getElementById('totalFruits').textContent = FRUTAS_OBJETIVO;

            // ---------- GESTIÓN DE CARGA ----------
            const totalAssets = 6 + 5; // 6 imágenes + 5 audios
            let assetsLoaded = 0;
            const loadingBar = document.getElementById('loadingBar');
            const startButton = document.getElementById('startButton');
            const loadingOverlay = document.getElementById('loadingOverlay');

            function assetLoaded() {
                assetsLoaded++;
                const percent = Math.floor((assetsLoaded / totalAssets) * 100);
                loadingBar.style.width = percent + '%';
                if (assetsLoaded === totalAssets) {
                    // Todo listo, mostrar botón
                    startButton.style.display = 'block';
                    loadingBar.parentElement.style.display = 'none'; // oculta barra
                }
            }

            // ---------- AUDIO ----------
            let audioCtx = null;
            let musicGain = null;
            let musicSource = null;
            let audioReady = false;

            const audioFiles = {
                background: 'musica_fondo.mp3',
                lanzar: 'lanzar_fruta.mp3',
                recoger: 'recoger_fruta.mp3',
                celebracion: 'celebracion.mp3',
                pasos: 'pasos.mp3'
            };
            const audioBuffers = {};

            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            } catch (e) {
                console.warn('Audio no soportado');
            }

            function loadAudio(name, url) {
                return fetch(url)
                    .then(response => {
                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                        return response.arrayBuffer();
                    })
                    .then(arrayBuffer => audioCtx.decodeAudioData(arrayBuffer))
                    .then(buffer => {
                        audioBuffers[name] = buffer;
                        assetLoaded(); // contar como recurso cargado
                    })
                    .catch(err => {
                        console.warn(`No se pudo cargar el audio "${name}":`, err);
                        assetLoaded(); // contar igual para no bloquear
                    });
            }

            // Iniciar carga de audios inmediatamente
            if (audioCtx) {
                Object.entries(audioFiles).forEach(([name, url]) => loadAudio(name, url));
            } else {
                // Si no hay audioCtx, marcar los 5 audios como cargados
                for (let i = 0; i < 5; i++) assetLoaded();
            }

            // Activar audio al pulsar el botón de inicio
            function startGameAfterLoad() {
                if (audioCtx) {
                    if (audioCtx.state === 'suspended') {
                        audioCtx.resume();
                    }
                    // Crear nodo de ganancia para música
                    if (!musicGain) {
                        musicGain = audioCtx.createGain();
                        musicGain.gain.value = 0.4;
                        musicGain.connect(audioCtx.destination);
                    }
                    // Iniciar música si el buffer está listo
                    if (audioBuffers.background) {
                        playBackgroundMusic();
                    }
                }
                audioReady = true;
                // Ocultar overlay de carga
                loadingOverlay.style.opacity = '0';
                setTimeout(() => {
                    loadingOverlay.style.display = 'none';
                }, 300);
                resetGame();
                gameLoop();
            }

            document.getElementById('startButton').addEventListener('click', startGameAfterLoad);

            function playBackgroundMusic() {
                if (!audioCtx || !audioBuffers.background || !musicGain) return;
                if (musicSource) {
                    musicSource.stop();
                    musicSource.disconnect();
                }
                musicSource = audioCtx.createBufferSource();
                musicSource.buffer = audioBuffers.background;
                musicSource.loop = true;
                musicSource.connect(musicGain);
                musicSource.start();
            }

            function playSound(name, volume = 0.7) {
                if (!audioReady || !audioCtx || !audioBuffers[name]) return;
                const source = audioCtx.createBufferSource();
                const gainNode = audioCtx.createGain();
                gainNode.gain.value = volume;
                source.buffer = audioBuffers[name];
                source.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                source.start();
            }

            function resizeCanvas() {
                const displayW = window.innerWidth;
                const displayH = window.innerHeight;
                const dpr = window.devicePixelRatio || 1;
                canvas.width = displayW * dpr;
                canvas.height = displayH * dpr;
                const scaleX = displayW / WORLD_W;
                const scaleY = displayH / WORLD_H;
                const scale = Math.min(scaleX, scaleY);
                const offsetX = (displayW - WORLD_W * scale) / 2;
                const offsetY = (displayH - WORLD_H * scale) / 2;
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.setTransform(dpr * scale, 0, 0, dpr * scale, dpr * offsetX, dpr * offsetY);
            }
            window.addEventListener('resize', resizeCanvas);
            window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 50));
            resizeCanvas();

            const heroW = 180;
            const heroH = 200;
            let heroX = WORLD_W/2 - heroW/2;
            const groundY = WORLD_H - heroH - 15;
            let heroY = groundY;

            const FRUIT_SIZE = 120;
            const BEAR_W = 260;
            const BEAR_H = 300;
            const RABBIT_W = 230;
            const RABBIT_H = 350;

            let leftPressed = false;
            let rightPressed = false;

            let wolfFruits = [];
            let fruitsCollected = 0;
            let wolfThrowCooldown = 0;
            let specialEventActive = false;
            let eventTimer = 0;
            const EVENT_DURATION = 100;
            let particles = [];

            let stepTimer = 0;
            const STEP_INTERVAL = 15;

            const images = { background: null, wolf: null, bear: null, rabbit: null, fruit: null, heroDefault: null };

            function imageLoaded() {
                assetLoaded(); // contar imagen
            }

            images.background = new Image();
            images.background.onload = imageLoaded;
            images.background.onerror = () => { console.warn("Error fondo"); imageLoaded(); };
            images.background.src = "fondo_bosque.png";

            images.wolf = new Image();
            images.wolf.onload = imageLoaded;
            images.wolf.onerror = () => { console.warn("Error lobo"); imageLoaded(); };
            images.wolf.src = "lobo_arbol.png";

            images.bear = new Image();
            images.bear.onload = imageLoaded;
            images.bear.onerror = () => { console.warn("Error oso"); imageLoaded(); };
            images.bear.src = "oso_saludo.png";

            images.rabbit = new Image();
            images.rabbit.onload = imageLoaded;
            images.rabbit.onerror = () => { console.warn("Error conejo"); imageLoaded(); };
            images.rabbit.src = "conejo_saludo.png";

            images.fruit = new Image();
            images.fruit.onload = imageLoaded;
            images.fruit.onerror = () => { console.warn("Error fruta"); imageLoaded(); };
            images.fruit.src = "fruta.png";

            images.heroDefault = new Image();
            images.heroDefault.onload = imageLoaded;
            images.heroDefault.onerror = () => { console.warn("Error heroe default"); imageLoaded(); };
            images.heroDefault.src = "masha_default.png";

            let currentHeroImage = images.heroDefault;

            function drawBackground() {
                if (images.background?.complete) ctx.drawImage(images.background, 0, 0, WORLD_W, WORLD_H);
                else { ctx.fillStyle = '#6f9e45'; ctx.fillRect(0, 0, WORLD_W, WORLD_H); }
            }
            function drawWolf() {
                if (images.wolf?.complete) ctx.drawImage(images.wolf, 620, WORLD_H - 600, 140, 220);
            }
            function drawGiantFruit(x, y) {
                if (images.fruit?.complete) ctx.drawImage(images.fruit, x, y, FRUIT_SIZE, FRUIT_SIZE);
                else {
                    ctx.fillStyle = '#e6321c';
                    ctx.beginPath();
                    ctx.ellipse(x+FRUIT_SIZE/2, y+FRUIT_SIZE/2, FRUIT_SIZE/2-5, FRUIT_SIZE/2-3, 0, 0, Math.PI*2);
                    ctx.fill();
                }
            }
            function drawHero() {
                if (currentHeroImage?.complete) {
                    ctx.save(); ctx.shadowBlur = 6;
                    ctx.drawImage(currentHeroImage, heroX, heroY, heroW, heroH);
                    ctx.restore();
                } else {
                    ctx.fillStyle = '#c0a070';
                    ctx.fillRect(heroX, heroY, heroW, heroH);
                }
            }
            function drawBearAndRabbit() {
                if (!specialEventActive) return;
                const alpha = eventTimer < 20 ? eventTimer / 20 : 1;
                ctx.globalAlpha = alpha;
                if (images.bear?.complete) ctx.drawImage(images.bear, 660, WORLD_H - 210, BEAR_W, BEAR_H);
                if (images.rabbit?.complete) ctx.drawImage(images.rabbit, 840, WORLD_H - 190, RABBIT_W, RABBIT_H);
                ctx.font = "bold 34px 'Comic Neue'";
                ctx.fillStyle = "#ffffff"; ctx.shadowBlur = 8;
                ctx.fillText("🎉 ¡مرحبا ساره! 🎉", 400, WORLD_H - 220);
                ctx.shadowBlur = 0; ctx.globalAlpha = 1;
            }

            function updateWolfThrows() {
                if (wolfThrowCooldown <= 0 && !specialEventActive) {
                    const loboX = 620 + 70;
                    const loboY = WORLD_H - 600 + 110;
                    const dir = Math.random() > 0.5 ? 1 : -0.7;
                    const baseVX = (Math.random() * 3 + 1.8);
                    const baseVY = 3.2;
                    wolfFruits.push({
                        x: loboX, y: loboY, size: FRUIT_SIZE,
                        vx: baseVX * dir * FRUIT_SPEED_MULTIPLIER,
                        vy: baseVY * FRUIT_SPEED_MULTIPLIER
                    });
                    wolfThrowCooldown = THROW_INTERVAL;
                    playSound('lanzar', 0.6);
                } else {
                    wolfThrowCooldown--;
                }
                for (let i = 0; i < wolfFruits.length; i++) {
                    const f = wolfFruits[i];
                    f.x += f.vx;
                    f.y += f.vy;
                    if (f.y > WORLD_H + 150 || f.x < -150 || f.x > WORLD_W + 150) {
                        wolfFruits.splice(i, 1);
                        i--;
                    }
                }
            }

            function checkFruitCollection() {
                for (let i = 0; i < wolfFruits.length; i++) {
                    const f = wolfFruits[i];
                    if (heroX < f.x + FRUIT_SIZE && heroX + heroW > f.x &&
                        heroY < f.y + FRUIT_SIZE && heroY + heroH > f.y) {
                        wolfFruits.splice(i,1);
                        if (!specialEventActive) {
                            fruitsCollected = Math.min(fruitsCollected + 1, FRUTAS_OBJETIVO);
                            document.getElementById('fruitCounter').innerText = fruitsCollected;
                            playSound('recoger', 0.8);
                            for(let p=0;p<12;p++) particles.push({
                                x: f.x+FRUIT_SIZE/2, y: f.y+FRUIT_SIZE/2,
                                vx: (Math.random()-0.5)*7, vy: (Math.random()-1)* -5,
                                life: 1, decay: 0.025, size: 4+Math.random()*6, color: '#ffb347'
                            });
                            if (fruitsCollected === FRUTAS_OBJETIVO) {
                                specialEventActive = true;
                                eventTimer = EVENT_DURATION;
                                fruitsCollected = 0;
                                document.getElementById('fruitCounter').innerText = '0';
                                playSound('celebracion', 0.9);
                                for (let j=0;j<40;j++) {
                                    setTimeout(() => {
                                        for(let k=0;k<5;k++) particles.push({
                                            x: 750+Math.random()*300, y: WORLD_H-180+Math.random()*100,
                                            vx: (Math.random()-0.5)*8, vy: (Math.random()-2)* -4,
                                            life: 1, decay: 0.02, size: 5+Math.random()*8, color: '#ffaa44'
                                        });
                                    }, j*30);
                                }
                            }
                        }
                        break;
                    }
                }
            }

            function updateMovement() {
                let moving = false;
                if (leftPressed && heroX > 12) {
                    heroX -= MOVE_SPEED;
                    moving = true;
                }
                if (rightPressed && heroX + heroW < WORLD_W - 12) {
                    heroX += MOVE_SPEED;
                    moving = true;
                }
                heroX = Math.min(Math.max(heroX, 8), WORLD_W - heroW - 8);
                if (moving) {
                    stepTimer++;
                    if (stepTimer >= STEP_INTERVAL) {
                        playSound('pasos', 0.4);
                        stepTimer = 0;
                    }
                } else {
                    stepTimer = 0;
                }
            }

            function updateParticles() {
                for (let i=particles.length-1; i>=0; i--) {
                    const p = particles[i];
                    p.x += p.vx; p.y += p.vy;
                    p.vy += 0.2;
                    p.life -= p.decay;
                    if (p.life <= 0) particles.splice(i,1);
                }
            }
            function drawParticles() {
                for (const p of particles) {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            }

            function render() {
                drawBackground();
                drawWolf();
                for (const f of wolfFruits) drawGiantFruit(f.x, f.y);
                drawParticles();
                drawHero();
                drawBearAndRabbit();
                if (specialEventActive) {
                    eventTimer--;
                    if (eventTimer <= 0) specialEventActive = false;
                }
            }

            function gameLoop() {
                if (!specialEventActive) updateMovement();
                updateWolfThrows();
                checkFruitCollection();
                updateParticles();
                render();
                requestAnimationFrame(gameLoop);
            }

            function resetGame() {
                wolfFruits = [];
                fruitsCollected = 0;
                document.getElementById('fruitCounter').innerText = "0";
                specialEventActive = false;
                eventTimer = 0;
                heroX = WORLD_W/2 - heroW/2;
                wolfThrowCooldown = 5;
                particles = [];
                stepTimer = 0;
            }

            function setUserPhoto(file) {
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => { currentHeroImage = img; };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }

            // Controles táctiles (idénticos)
            let touchStartX = null, isDragging = false;
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const scale = Math.min(window.innerWidth / WORLD_W, window.innerHeight / WORLD_H);
                const offsetX = (window.innerWidth - WORLD_W * scale) / 2;
                touchStartX = (e.touches[0].clientX - rect.left - offsetX) / scale;
                isDragging = true;
            });
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!isDragging) return;
                const rect = canvas.getBoundingClientRect();
                const scale = Math.min(window.innerWidth / WORLD_W, window.innerHeight / WORLD_H);
                const offsetX = (window.innerWidth - WORLD_W * scale) / 2;
                const canvasX = (e.touches[0].clientX - rect.left - offsetX) / scale;
                const delta = canvasX - touchStartX;
                if (Math.abs(delta) > 8) {
                    rightPressed = (delta > 0);
                    leftPressed = !rightPressed;
                    touchStartX = canvasX;
                }
            });
            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                leftPressed = rightPressed = false;
                isDragging = false;
            });
            canvas.addEventListener('touchcancel', (e) => {
                e.preventDefault();
                leftPressed = rightPressed = false;
                isDragging = false;
            });

            window.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') { leftPressed = true; e.preventDefault(); }
                if (e.key === 'ArrowRight') { rightPressed = true; e.preventDefault(); }
            });
            window.addEventListener('keyup', (e) => {
                if (e.key === 'ArrowLeft') leftPressed = false;
                if (e.key === 'ArrowRight') rightPressed = false;
            });

            document.getElementById('heroPhoto').addEventListener('change', (e) => {
                if (e.target.files[0]) setUserPhoto(e.target.files[0]);
            });
            document.getElementById('resetBtn').addEventListener('click', resetGame);
            document.getElementById('fullscreenBtn').addEventListener('click', () => {
                if (document.fullscreenElement) document.exitFullscreen();
                else document.documentElement.requestFullscreen();
            });

            // Ya no se inicia automáticamente; esperamos al botón de inicio
        })();
    </script>
</body>
</html>
