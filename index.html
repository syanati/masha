<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, touch-action: manipulation">
    <title>Masha y el Oso - Aventura en el Bosque</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        body {
            background: #1a3a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Comic Neue', cursive;
            touch-action: pan-x pan-y; /* permite deslizar si es necesario, pero los botones capturan el toque */
        }
        .game-wrapper {
            width: 100%;
            max-width: 800px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        canvas {
            width: 100%;
            height: auto;
            aspect-ratio: 1100 / 620;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #87c38f;
        }
        .control-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin: 15px 0;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            background: #f3a546;
            border: none;
            color: #2d1b0c;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 6px 0 #b85e1a;
            transition: 0.1s;
            touch-action: manipulation;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #b85e1a;
        }
        .move-buttons {
            display: flex;
            gap: 20px;
        }
        .move-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #5f3b1c;
            color: white;
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 0 #2d1a0a;
            touch-action: manipulation;
            border: none;
        }
        .move-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #2d1a0a;
        }
        .score {
            background: #fef5e0;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #c73f1e;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }
        .upload-area {
            background: #e7bc7e;
            padding: 8px 18px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .upload-label {
            background: #f3a546;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            color: #2d1b0c;
            font-size: 1rem;
        }
        #heroPhoto {
            display: none;
        }
        @media (max-width: 600px) {
            .btn { padding: 10px 18px; font-size: 1rem; }
            .move-btn { width: 60px; height: 60px; font-size: 1.8rem; }
            .score { font-size: 1.4rem; padding: 8px 20px; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <canvas id="gameCanvas"></canvas>

    <div class="control-bar">
        <div class="move-buttons">
            <button class="move-btn" id="btnLeft">◀</button>
            <button class="move-btn" id="btnRight">▶</button>
        </div>
        <div class="score">
            🍎 <span id="fruitCounter">0</span>/5
        </div>
        <div class="upload-area">
            <label class="upload-label" for="heroPhoto">📸 Subir foto</label>
            <input type="file" id="heroPhoto" accept="image/png, image/jpeg, image/jpg, image/webp">
            <button class="btn" id="resetBtn">🔄 Reiniciar</button>
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- CONFIGURACIÓN DEL CANVAS ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const CW = 1100;  // ancho lógico
        const CH = 620;   // alto lógico
        const DPR = window.devicePixelRatio || 1;

        function resizeCanvas() {
            canvas.width = CW * DPR;
            canvas.height = CH * DPR;
            canvas.style.width = '100%';
            canvas.style.height = 'auto';
            ctx.setTransform(1,0,0,1,0,0); // reset
            ctx.scale(DPR, DPR);
        }
        resizeCanvas();

        // ---------- IMÁGENES ----------
        const images = {};
        const imageSources = {
            background: 'fondo_bosque.png',
            wolf: 'lobo_arbol.png',
            bear: 'oso_saludo.png',
            rabbit: 'conejo_saludo.png',
            fruit: 'fruta.png',
            heroBody: 'cuerpo_masha.png',
            heroDefault: 'masha_default.png'
        };

        let imagesLoaded = 0;
        const totalImages = Object.keys(imageSources).length;

        // ---------- ESTADO DEL JUEGO ----------
        let heroImage = null;        // foto del usuario
        let heroX = CW/2 - 42;       // centro
        const heroW = 84;
        const heroH = 92;
        const groundY = CH - heroH - 20;

        let leftPressed = false;
        let rightPressed = false;
        const moveSpeed = 6;

        let wolfFruits = [];
        const FRUIT_SIZE = 24;
        let fruitsCollected = 0;
        let wolfThrowCooldown = 0;

        let specialEventActive = false;
        let eventTimer = 0;
        const EVENT_DURATION = 100;

        let particles = [];

        // ---------- PRECARGA ----------
        function loadImages() {
            for (let key in imageSources) {
                const img = new Image();
                img.src = imageSources[key];
                img.onload = () => {
                    imagesLoaded++;
                    if (imagesLoaded === totalImages) startGame();
                };
                img.onerror = () => {
                    console.error('Error al cargar imagen:', key);
                    imagesLoaded++;
                    if (imagesLoaded === totalImages) startGame();
                };
                images[key] = img;
            }
        }

        function startGame() {
            resetGame();
            gameLoop();
        }

        // ---------- PARTÍCULAS ----------
        function spawnParticles(x, y, count, color) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 2) * -5,
                    life: 1,
                    decay: 0.02 + Math.random() * 0.03,
                    size: 3 + Math.random() * 5,
                    color: color
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.2;
                p.life -= p.decay;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function drawParticles() {
            for (let p of particles) {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        // ---------- DIBUJOS CON IMÁGENES REALES ----------
        function drawBackground() {
            if (images.background) {
                ctx.drawImage(images.background, 0, 0, CW, CH);
            } else {
                ctx.fillStyle = '#6f9e45';
                ctx.fillRect(0, 0, CW, CH);
            }
        }

        function drawWolf() {
            if (images.wolf) {
                ctx.drawImage(images.wolf, 50, CH - 350, 140, 220);
            }
        }

        function drawFruit(x, y) {
            if (images.fruit) {
                ctx.drawImage(images.fruit, x, y, FRUIT_SIZE, FRUIT_SIZE);
            } else {
                // respaldo
                ctx.fillStyle = '#e6321c';
                ctx.beginPath();
                ctx.arc(x+FRUIT_SIZE/2, y+FRUIT_SIZE/2, FRUIT_SIZE/2-2, 0, Math.PI*2);
                ctx.fill();
            }
        }

        function drawHero() {
            // Cuerpo de Masha
            if (images.heroBody) {
                ctx.drawImage(images.heroBody, heroX, groundY, heroW, heroH);
            }

            // Cabeza (foto o default)
            const headCX = heroX + heroW/2;
            const headCY = groundY + 22;
            const headRadius = 28;

            ctx.save();
            ctx.beginPath();
            ctx.arc(headCX, headCY, headRadius, 0, Math.PI * 2);
            ctx.closePath();
            ctx.clip();

            if (heroImage && heroImage.complete && heroImage.naturalWidth > 0) {
                // Foto del usuario
                ctx.drawImage(heroImage,
                    headCX - headRadius, headCY - headRadius,
                    headRadius * 2, headRadius * 2);
            } else if (images.heroDefault) {
                // Masha por defecto (cabeza y cuerpo ya incluidos en heroBody? Para evitar doble cuerpo, mejor dibujar solo cabeza)
                // Dibujamos la imagen completa escalada dentro del círculo
                ctx.drawImage(images.heroDefault,
                    headCX - headRadius, headCY - headRadius - 10,
                    headRadius * 2, headRadius * 2 + 10);
            }
            ctx.restore();

            // Borde de la cabeza
            ctx.beginPath();
            ctx.arc(headCX, headCY, headRadius, 0, Math.PI * 2);
            ctx.strokeStyle = '#ffd966';
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        function drawEvent() {
            if (!specialEventActive) return;
            const alpha = eventTimer < 15 ? eventTimer / 15 : 1;
            ctx.globalAlpha = alpha;

            // Oso
            if (images.bear) {
                ctx.drawImage(images.bear, 680, CH - 170, 160, 200);
            }
            // Conejo
            if (images.rabbit) {
                ctx.drawImage(images.rabbit, 840, CH - 160, 130, 150);
            }

            // Texto de celebración
            ctx.font = "bold 28px 'Comic Neue', cursive";
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'black';
            ctx.fillText("🎉 ¡HOLA AMIGO! 🎉", 500, CH - 200);
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;

            eventTimer--;
            if (eventTimer <= 0) specialEventActive = false;
        }

        // ---------- ACTUALIZACIÓN DEL JUEGO ----------
        function updateWolfThrows() {
            if (wolfThrowCooldown <= 0 && !specialEventActive) {
                wolfFruits.push({
                    x: 90,
                    y: CH - 350,
                    size: FRUIT_SIZE,
                    vx: (Math.random() * 2 + 1.5) * (Math.random() > 0.5 ? 1 : -0.8),
                    vy: 2.8
                });
                wolfThrowCooldown = 35;
            } else {
                wolfThrowCooldown--;
            }

            for (let i = 0; i < wolfFruits.length; i++) {
                const f = wolfFruits[i];
                f.x += f.vx;
                f.y += f.vy;
                if (f.y > CH + 80 || f.x < -50 || f.x > CW + 80) {
                    wolfFruits.splice(i, 1);
                    i--;
                }
            }
        }

        function checkFruitCollection() {
            for (let i = 0; i < wolfFruits.length; i++) {
                const f = wolfFruits[i];
                if (heroX < f.x + FRUIT_SIZE && heroX + heroW > f.x &&
                    groundY < f.y + FRUIT_SIZE && groundY + heroH > f.y) {
                    wolfFruits.splice(i, 1);
                    if (!specialEventActive) {
                        fruitsCollected = Math.min(fruitsCollected + 1, 5);
                        document.getElementById('fruitCounter').innerText = fruitsCollected;
                        spawnParticles(f.x + FRUIT_SIZE/2, f.y + FRUIT_SIZE/2, 8, '#ffd700');
                        if (fruitsCollected === 5) {
                            specialEventActive = true;
                            eventTimer = EVENT_DURATION;
                            fruitsCollected = 0;
                            document.getElementById('fruitCounter').innerText = '0';
                            // Lluvia de partículas en celebración
                            for (let j = 0; j < 30; j++) {
                                setTimeout(() => {
                                    spawnParticles(750 + Math.random()*200, CH-200, 5, '#ff6b6b');
                                }, j * 50);
                            }
                        }
                    }
                    break;
                }
            }
        }

        function updateMovement() {
            if (leftPressed && heroX > 10) heroX -= moveSpeed;
            if (rightPressed && heroX + heroW < CW - 10) heroX += moveSpeed;
            heroX = Math.min(Math.max(heroX, 5), CW - heroW - 5);
        }

        function render() {
            drawBackground();
            drawWolf();
            for (let f of wolfFruits) drawFruit(f.x, f.y);
            drawParticles();
            drawHero();
            drawEvent();
        }

        function gameLoop() {
            if (!specialEventActive) updateMovement();
            updateWolfThrows();
            checkFruitCollection();
            updateParticles();
            render();
            requestAnimationFrame(gameLoop);
        }

        function resetGame() {
            wolfFruits = [];
            fruitsCollected = 0;
            document.getElementById('fruitCounter').innerText = '0';
            specialEventActive = false;
            eventTimer = 0;
            heroX = CW/2 - heroW/2;
            wolfThrowCooldown = 10;
            particles = [];
        }

        // ---------- CONTROLES TÁCTILES Y TECLADO ----------
        document.getElementById('btnLeft').addEventListener('pointerdown', (e) => { e.preventDefault(); leftPressed = true; });
        document.getElementById('btnLeft').addEventListener('pointerup', (e) => { e.preventDefault(); leftPressed = false; });
        document.getElementById('btnLeft').addEventListener('pointerleave', () => { leftPressed = false; });

        document.getElementById('btnRight').addEventListener('pointerdown', (e) => { e.preventDefault(); rightPressed = true; });
        document.getElementById('btnRight').addEventListener('pointerup', (e) => { e.preventDefault(); rightPressed = false; });
        document.getElementById('btnRight').addEventListener('pointerleave', () => { rightPressed = false; });

        // Teclado para PC
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') { leftPressed = true; e.preventDefault(); }
            if (e.key === 'ArrowRight') { rightPressed = true; e.preventDefault(); }
        });
        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft') leftPressed = false;
            if (e.key === 'ArrowRight') rightPressed = false;
        });

        // Subida de foto
        document.getElementById('heroPhoto').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => { heroImage = img; };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('resetBtn').addEventListener('click', resetGame);

        // Iniciar la carga de imágenes
        loadImages();
    })();
</script>
</body>
</html>
